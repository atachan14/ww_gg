<section class="panel tactics-panel">
    <h2>戦略オプション</h2>

    <div class="tactics-groups">
        {% for group in tactics_groups %}
        <details class="tactics-group" data-tactics-key="{{ group.key }}" {% if group.expanded %}open{% endif %}>
            <summary>{{ group.title }}</summary>
            <div class="panel-box tactics-box">
                <ul class="compact-list">
                    {% for label, value in group.items %}
                    <li><span>{{ label }}</span><strong>{{ value }}</strong></li>
                    {% endfor %}
                </ul>
            </div>
        </details>
        {% endfor %}
    </div>
</section>
