<div class="option-groups">
    {% for group in groups %}
    <details class="option-group" data-option-key="{{ group.key }}" data-open-name="open_{{ option_scope }}_{{ group.key }}" {% if group.expanded %}open{% endif %}>
        {% if persist_open_state %}
        <input type="hidden" name="open_{{ option_scope }}_{{ group.key }}" value="{{ '1' if group.expanded else '0' }}" data-open-input="open_{{ option_scope }}_{{ group.key }}">
        {% endif %}
        <summary>{{ group.title }}</summary>
        <div class="panel-box option-box">
            <div class="option-items">
                {% for item in group.items %}
                <label class="option-item">
                    <span>{{ item.label }}</span>
                    <select name="{{ item.key }}">
                        {% for choice in item.choices %}
                        <option value="{{ choice }}" {% if choice == item.selected %}selected{% endif %}>{{ choice }}</option>
                        {% endfor %}
                    </select>
                </label>
                {% endfor %}
            </div>
        </div>
    </details>
    {% endfor %}
</div>
